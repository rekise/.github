name: "Task"
description: "Create a task to track work that needs to be done"
title: "<type>(<scope>): <brief description>"
labels: ["task"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Task Submission Guidelines

        **Title Format**: Follow [Conventional Commits](https://www.conventionalcommits.org/en/v1.0.0/) specification.

        | Type | Use When |
        |------|----------|
        | `feat` | Adding new functionality |
        | `fix` | Correcting a bug |
        | `refactor` | Restructuring without behavior change |
        | `docs` | Documentation only |
        | `test` | Adding or updating tests |
        | `chore` | Maintenance tasks |
        | `perf` | Performance improvements |

        **Example**: `feat(navigation): add obstacle avoidance algorithm`

        ---

  - type: dropdown
    id: task-type
    attributes:
      label: Task Type
      description: Select the type of work
      options:
        - "feat: New feature"
        - "fix: Bug fix"
        - "refactor: Code restructuring"
        - "docs: Documentation"
        - "test: Testing"
        - "chore: Maintenance"
        - "perf: Performance"
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What is the high-level goal of this task? (1-2 sentences)
      placeholder: "Enable the system to detect and avoid obstacles in real-time using LiDAR data."
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Provide context, background, and specifics about the task
      placeholder: |
        - Current state: The navigation stack does not have obstacle avoidance
        - Motivation: Required for autonomous operation in dynamic environments
        - Constraints: Must work with existing sensor configuration
        - Related docs: [Link to spec or design doc]
    validations:
      required: true

  - type: textarea
    id: affected-components
    attributes:
      label: Affected Components
      description: List packages, modules, or files that will be modified
      placeholder: |
        - `rkse_navigation`: `obstacle_detector` node
        - `rkse_hsal_lidar_driver`: May need configuration updates
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define what "done" looks like. Use checkboxes for each criterion
      placeholder: |
        - [ ] Obstacle detection works within 0.5m - 10m range
        - [ ] System stops within 0.3m of obstacles
        - [ ] Detection latency < 100ms
        - [ ] Unit tests achieve 80%+ coverage
        - [ ] Documentation updated
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List any blockers, prerequisites, or related issues
      placeholder: |
        - Blocked by: #123 (LiDAR driver calibration)
        - Requires: ROS2 Humble setup
        - Related: #456
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---

        ## Assignee Response Required

        > **Before starting work**, the assignee **MUST** respond to this issue with:
        >
        > ### Implementation Plan
        > 1. Technical approach and design decisions
        > 2. Files/components to be modified
        > 3. Estimated scope (S/M/L)
        >
        > ### Test Cases
        > Detailed test scenarios covering:
        > - Unit tests
        > - Integration tests (if applicable)
        > - Manual verification steps
        >
        > **This ensures alignment between requester and assignee before implementation begins.**

  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Requester Acknowledgment
      description: Confirm you understand the workflow
      options:
        - label: I understand the assignee will respond with an implementation plan and test cases for approval before starting work
          required: true
